<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
            color: #38bdf8;
        }

        .result-container {
            background-color: #0f172a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            font-size: 1.2rem;
            letter-spacing: 1px;
            border-radius: 6px;
            margin-bottom: 20px;
            word-break: break-all;
            border: 1px solid #334155;
        }

        #password {
            user-select: all;
            color: #e2e8f0;
        }

        .btn-copy {
            background-color: #38bdf8;
            border: none;
            color: #0f172a;
            padding: 6px 12px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
            margin-left: 10px;
        }

        .btn-copy:hover {
            background-color: #7dd3fc;
        }

        .setting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        /* Group layout to fit label, slider, and number box in the same row */
        .length-control-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
            justify-content: flex-end;
            max-width: 65%;
        }

        label {
            color: #cbd5e1;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: #38bdf8;
            cursor: pointer;
            height: 6px;
            border-radius: 3px;
        }

        input[type="number"] {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 5px;
            width: 55px;
            border-radius: 4px;
            text-align: center;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #38bdf8;
            cursor: pointer;
        }

        .btn-generate {
            display: block;
            width: 100%;
            background-color: #10b981;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .btn-generate:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Password Generator</h1>
        
        <div class="result-container">
            <span id="password">Click Generate</span>
            <button class="btn-copy" id="copyBtn">Copy</button>
        </div>

        <div class="settings">
            <!-- Modifed layout line: Label, Slider, and Number input stay perfectly inline -->
            <div class="setting">
                <label>Length</label>
                <div class="length-control-group">
                    <input type="range" id="lengthSlider" min="4" max="50" value="12">
                    <input type="number" id="length" min="4" max="50" value="12">
                </div>
            </div>
            <div class="setting">
                <label>Include Uppercase Letters (A-Z)</label>
                <input type="checkbox" id="uppercase" checked>
            </div>
            <div class="setting">
                <label>Include Lowercase Letters (a-z)</label>
                <input type="checkbox" id="lowercase" checked>
            </div>
            <div class="setting">
                <label>Include Numbers (0-9)</label>
                <input type="checkbox" id="numbers" checked>
            </div>
            <div class="setting">
                <label>Include Symbols (!@#$%^&*)</label>
                <input type="checkbox" id="symbols" checked>
            </div>
        </div>

        <button class="btn-generate" id="generateBtn">Generate Password</button>
    </div>

    <script>
        const passwordEl = document.getElementById('password');
        const lengthEl = document.getElementById('length');
        const lengthSliderEl = document.getElementById('lengthSlider');
        const uppercaseEl = document.getElementById('uppercase');
        const lowercaseEl = document.getElementById('lowercase');
        const numbersEl = document.getElementById('numbers');
        const symbolsEl = document.getElementById('symbols');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');

        const uppercaseChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const lowercaseChars = 'abcdefghijklmnopqrstuvwxyz';
        const numberChars = '0123456789';
        const symbolChars = '!@#$%^&*()_+~`|}{[]:;?><,./-=';

        // Connect the slider and the number box together
        lengthSliderEl.addEventListener('input', (e) => {
            lengthEl.value = e.target.value;
        });
        
        lengthEl.addEventListener('input', (e) => {
            let val = parseInt(e.target.value);
            if (!isNaN(val) && val >= 4 && val <= 50) {
                lengthSliderEl.value = val;
            }
        });

        function generatePassword() {
            let length = parseInt(lengthEl.value);
            
            if (isNaN(length) || length < 4) length = 4;
            if (length > 50) length = 50;
            lengthEl.value = length;
            lengthSliderEl.value = length;

            let allowedChars = '';
            let mandatoryChars = [];

            if (uppercaseEl.checked) {
                allowedChars += uppercaseChars;
                mandatoryChars.push(uppercaseChars[Math.floor(Math.random() * uppercaseChars.length)]);
            }
            if (lowercaseEl.checked) {
                allowedChars += lowercaseChars;
                mandatoryChars.push(lowercaseChars[Math.floor(Math.random() * lowercaseChars.length)]);
            }
            if (numbersEl.checked) {
                allowedChars += numberChars;
                mandatoryChars.push(numberChars[Math.floor(Math.random() * numberChars.length)]);
            }
            if (symbolsEl.checked) {
                allowedChars += symbolChars;
                mandatoryChars.push(symbolChars[Math.floor(Math.random() * symbolChars.length)]);
            }

            if (allowedChars === '') {
                passwordEl.innerText = 'Select at least 1 option';
                return;
            }

            let generatedPassword = [...mandatoryChars];
            const remainingLength = length - mandatoryChars.length;

            for (let i = 0; i < remainingLength; i++) {
                const randomIndex = Math.floor(Math.random() * allowedChars.length);
                generatedPassword.push(allowedChars[randomIndex]);
            }

            generatedPassword = generatedPassword.sort(() => Math.random() - 0.5);

            passwordEl.innerText = generatedPassword.join('');
            copyBtn.innerText = 'Copy';
        }

        copyBtn.addEventListener('click', () => {
            const password = passwordEl.innerText;
            if (password === 'Click Generate' || password === 'Select at least 1 option') {
                return;
            }
            
            navigator.clipboard.writeText(password).then(() => {
                copyBtn.innerText = 'Copied!';
                setTimeout(() => {
                    copyBtn.innerText = 'Copy';
                }, 2000);
            });
        });

        generateBtn.addEventListener('click', generatePassword);
    </script>
</body>
</html>
